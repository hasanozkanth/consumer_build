name: Manual FlutterFlow APK Build

on:
  workflow_dispatch: # Manuel tetikleme için
  push:
    branches:
      - main # Main branch'e push yapıldığında da çalışır

jobs:
  build:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install FlutterFlow CLI
        run: dart pub global activate flutterflow_cli

      - name: Export Code from FlutterFlow
        env:
          FF_TOKEN: ${{ secrets.FLUTTERFLOW_API_TOKEN }}
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          
          # Kodu dışarı aktar (CLI varsayılan proje adını kullanacaktır)
          flutterflow export-code --project things-happen-consumer-w17r4e --project-environment Production --include-assets --token $FF_TOKEN
          
          # Çıkan klasörü 'exported_code' olarak adlandır (İsim ne olursa olsun bulur ve değiştirir)
          # FlutterFlow genelde proje ID'sinin ilk kısmını veya snake_case halini kullanır.
          # ls -d */ komutuyla oluşan klasörü yakalayıp ismini değiştiriyoruz.
          mv things_happen_consumer* exported_code 2>/dev/null || mv things-happen-consumer* exported_code 2>/dev/null || true

      - name: Get Dependencies
        run: |
          cd exported_code
          flutter pub get

      - name: Build APK
        run: |
          cd exported_code
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: exported_code/build/app/outputs/flutter-apk/app-release.apk
