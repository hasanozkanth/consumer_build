name: Manual FlutterFlow APK Build

on:
  workflow_dispatch: # Bu satır manuel tetikleme butonunu aktif eder
  push:
    branches:
      - main # İstersen push edildiğinde de çalışmaya devam eder, istemiyorsan bu kısmı silebilirsin

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install FlutterFlow CLI
        run: dart pub global activate flutterflow_cli

      - name: Export Code from FlutterFlow
        env:
          FF_TOKEN: ${{ secrets.FLUTTERFLOW_API_TOKEN }}
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutterflow export-code --project things-happen-consumer-w17r4e --project-environment Production --include-assets --token $FF_TOKEN --output-directory exported_code

      - name: Get Dependencies
        run: |
          cd exported_code
          flutter pub get

      - name: Build APK
        run: |
          cd exported_code
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: exported_code/build/app/outputs/flutter-apk/app-release.apk
